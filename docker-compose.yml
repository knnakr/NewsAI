services:
  api:
    build: ./backend
    ports:
      - "8001:8001"
    environment:
      DATABASE_URL: postgresql+asyncpg://newsai:newsai@db:5432/newsai
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: newsai
      POSTGRES_PASSWORD: newsai
      POSTGRES_DB: newsai
    ports:
      - "5433:5432"
    volumes:
      - ./backend/schema.sql:/docker-entrypoint-initdb.d
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U newsai"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
